name: Auto Register

on:
  issues:
    types: [opened]

jobs:
  register:
    if: contains(github.event.issue.body, 'NATRIN_REG')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 提取并写入（原样追加，不做任何处理）
        id: process
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          # 提取 DATA= 后面的内容（客户端已经格式化好的 {hash,hash}）
          DATA=$(echo "$BODY" | grep "^DATA=" | cut -d'=' -f2- | tr -d '\n\r')
          
          # 验证格式：必须以 { 开头，} 结尾，中间有逗号
          if [[ ! "$DATA" =~ ^\{[a-f0-9]{64},[a-f0-9]{64}\}$ ]]; then
            echo "failed=true" >> $GITHUB_OUTPUT
            echo "debug_data=${DATA:0:50}..." >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 检查是否已存在（提取 user_hash 部分）
          USER_HASH=$(echo "$DATA" | cut -d',' -f1 | tr -d '{')
          if grep -q "{$USER_HASH," Auth; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "data=$DATA" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 原样追加到文件（不做任何修改）
          echo "$DATA" >> Auth
          echo "failed=false" >> $GITHUB_OUTPUT
          echo "data=$DATA" >> $GITHUB_OUTPUT
          
      - name: 提交更改
        if: steps.process.outputs.failed == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Auth
          git commit -m "auto: register ${{ steps.process.outputs.data }}"
          git push
          
      - name: 关闭 Issue（成功）
        if: steps.process.outputs.failed == 'false' && steps.process.outputs.exists != 'true'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ✅ **注册成功！**
            您的账号已激活，现在可以使用客户端登录了。
            
      - name: 关闭 Issue（已存在）
        if: steps.process.outputs.exists == 'true'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ⚠️ **该账号已注册**，请直接登录，无需重复注册。
            
      - name: 关闭 Issue（格式错误）
        if: steps.process.outputs.failed == 'true'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ❌ **注册失败**：数据格式错误。
            调试信息：${{ steps.process.outputs.debug_data }}
            请更新客户端后重新提交。
