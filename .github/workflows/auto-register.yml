name: Auto Register

on:
  issues:
    types: [opened]

jobs:
  register:
    if: contains(github.event.issue.body, 'NATRIN_REG')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 解析注册数据（使用 Node.js 避免 Shell 转义问题）
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = process.env.BODY;
            
            // 使用正则提取，更精确
            const userMatch = body.match(/USER_HASH=([a-f0-9]{64})/i);
            const pwdMatch = body.match(/PWD_HASH=([a-f0-9]{64})/i);
            
            if (!userMatch || !pwdMatch) {
              core.setOutput('failed', 'true');
              core.setOutput('debug', 'Regex match failed');
              return;
            }
            
            const userHash = userMatch[1].toLowerCase();
            const pwdHash = pwdMatch[1].toLowerCase();
            
            // 验证长度
            if (userHash.length !== 64 || pwdHash.length !== 64) {
              core.setOutput('failed', 'true');
              core.setOutput('debug', `Length mismatch: user=${userHash.length}, pwd=${pwdHash.length}`);
              return;
            }
            
            core.setOutput('user', userHash);
            core.setOutput('pwd', pwdHash);
            core.setOutput('failed', 'false');
        env:
          BODY: ${{ github.event.issue.body }}
          
      - name: 检查是否已存在
        id: check
        if: steps.extract.outputs.failed == 'false'
        run: |
          USER="${{ steps.extract.outputs.user }}"
          if grep -q "{$USER," Auth; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          
      - name: 追加到 Auth 文件（使用 Node.js 避免格式问题）
        if: steps.extract.outputs.failed == 'false' && steps.check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const user = '${{ steps.extract.outputs.user }}';
            const pwd = '${{ steps.extract.outputs.pwd }}';
            const line = `{${user},${pwd}}\n`;
            fs.appendFileSync('Auth', line);
            console.log('Appended:', line.trim());
          
      - name: 提交更改
        if: steps.extract.outputs.failed == 'false' && steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Auth
          git commit -m "auto: register ${{ steps.extract.outputs.user }}"
          git push
          
      - name: 关闭 Issue（成功）
        if: steps.extract.outputs.failed == 'false' && steps.check.outputs.exists == 'false'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ✅ **注册成功！**
            您的账号已激活，现在可以使用客户端登录了。
            
      - name: 关闭 Issue（已存在）
        if: steps.check.outputs.exists == 'true'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ⚠️ **该账号已注册**，请直接登录，无需重复注册。
            
      - name: 关闭 Issue（解析失败）
        if: steps.extract.outputs.failed == 'true'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ❌ **注册失败**：无法解析注册数据。
            调试信息：${{ steps.extract.outputs.debug }}
            请通过客户端重新提交。
