name: Auto Register

on:
  issues:
    types: [opened]

jobs:
  register:
    if: contains(github.event.issue.body, 'NATRIN_REG')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 解析注册数据
        id: extract
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          USER_HASH=$(echo "$BODY" | grep -oP 'USER_HASH=\K[a-f0-9]{64}' | head -1)
          PWD_HASH=$(echo "$BODY" | grep -oP 'PWD_HASH=\K[a-f0-9]{64}' | head -1)
          
          if [ -z "$USER_HASH" ] || [ -z "$PWD_HASH" ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "user=$USER_HASH" >> $GITHUB_OUTPUT
          echo "pwd=$PWD_HASH" >> $GITHUB_OUTPUT
          echo "failed=false" >> $GITHUB_OUTPUT
          
      - name: 追加到 Auth 文件
        if: steps.extract.outputs.failed == 'false'
        run: |
          # 去重检查
          if grep -q "${{ steps.extract.outputs.user }}" Auth; then
            echo "exists=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "{${{ steps.extract.outputs.user }},${{ steps.extract.outputs.pwd }}}" >> Auth
          echo "exists=false" >> $GITHUB_OUTPUT
          
      - name: 提交更改
        if: steps.extract.outputs.failed == 'false' && steps.extract.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Auth
          git commit -m "auto: register ${{ steps.extract.outputs.user }}"
          git push
          
      - name: 关闭 Issue（成功）
        if: steps.extract.outputs.failed == 'false' && steps.extract.outputs.exists == 'false'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ✅ **注册成功！**
            您的账号已激活，现在可以使用客户端登录了。
            
      - name: 关闭 Issue（已存在）
        if: steps.extract.outputs.exists == 'true'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ⚠️ **该账号已注册**，请直接登录，无需重复注册。
            
      - name: 关闭 Issue（解析失败）
        if: steps.extract.outputs.failed == 'true'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ❌ **注册失败**：无法解析注册数据，请通过客户端重新提交。
