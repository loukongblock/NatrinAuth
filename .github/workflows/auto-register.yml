name: Auto Register

on:
  issues:
    types: [opened]

jobs:
  register:
    if: contains(github.event.issue.body, 'NATRIN_REG')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 解析注册数据
        id: extract
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          # 使用更可靠的方式提取，避免正则问题
          USER_HASH=$(echo "$BODY" | grep "USER_HASH=" | head -1 | cut -d'=' -f2 | tr -d '[:space:]')
          PWD_HASH=$(echo "$BODY" | grep "PWD_HASH=" | head -1 | cut -d'=' -f2 | tr -d '[:space:]')
          
          # 验证哈希格式（64位小写十六进制）
          if [[ ! "$USER_HASH" =~ ^[a-f0-9]{64}$ ]] || [[ ! "$PWD_HASH" =~ ^[a-f0-9]{64}$ ]]; then
            echo "failed=true" >> $GITHUB_OUTPUT
            echo "debug_user=${USER_HASH:0:20}..." >> $GITHUB_OUTPUT
            echo "debug_pwd=${PWD_HASH:0:20}..." >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "user=$USER_HASH" >> $GITHUB_OUTPUT
          echo "pwd=$PWD_HASH" >> $GITHUB_OUTPUT
          echo "failed=false" >> $GITHUB_OUTPUT
          
      - name: 检查是否已存在
        id: check
        if: steps.extract.outputs.failed == 'false'
        run: |
          if grep -q "${{ steps.extract.outputs.user }}" Auth; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          
      - name: 追加到 Auth 文件
        if: steps.extract.outputs.failed == 'false' && steps.check.outputs.exists == 'false'
        run: |
          # 确保格式完全正确：{user_hash,pwd_hash} 无空格
          USER="${{ steps.extract.outputs.user }}"
          PWD="${{ steps.extract.outputs.pwd }}"
          echo "{$USER,$PWD}" >> Auth
          
      - name: 提交更改
        if: steps.extract.outputs.failed == 'false' && steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Auth
          git commit -m "auto: register ${{ steps.extract.outputs.user }}"
          git push
          
      - name: 关闭 Issue（成功）
        if: steps.extract.outputs.failed == 'false' && steps.check.outputs.exists == 'false'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ✅ **注册成功！**
            您的账号已激活，现在可以使用客户端登录了。
            
      - name: 关闭 Issue（已存在）
        if: steps.check.outputs.exists == 'true'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ⚠️ **该账号已注册**，请直接登录，无需重复注册。
            
      - name: 关闭 Issue（解析失败）
        if: steps.extract.outputs.failed == 'true'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ❌ **注册失败**：无法解析注册数据。
            调试信息：USER_HASH=${{ steps.extract.outputs.debug_user }}, PWD_HASH=${{ steps.extract.outputs.debug_pwd }}
            请通过客户端重新提交。
